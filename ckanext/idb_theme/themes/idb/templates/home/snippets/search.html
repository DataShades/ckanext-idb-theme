{% set placeholder = _('Search datasets') %}
{% set dataset_type = h.default_package_type() %}

<div class="mt-2">
    {%- call ui.util.call(ui.form, action=h.url_for(dataset_type ~ '.search'), attrs={"class": "search-form"}) -%}
        <div class="input-group">
            <input aria-label="{% block header_site_search_label %}{{ h.humanize_entity_type('package', dataset_type, 'search placeholder') or _('Search datasets') }}{% endblock %}" id="field-main-search" type="text" class="form-control rounded-0" name="q" value="" autocomplete="off" placeholder="{% block search_placeholder %}{{ placeholder }}{% endblock %}" />
            <button class="btn btn-light" type="submit" aria-labelledby="search-label">
                {{ ui.icon("search") }}
                <span class="visually-hidden" id="search-label">{{ _('Search') }}</span>
            </button>
        </div>
    {%- endcall %}
</div>
