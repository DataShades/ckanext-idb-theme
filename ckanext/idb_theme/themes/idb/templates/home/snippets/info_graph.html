{% set info_graph = h.idb_theme_info_graph() %}
<div class="border-primary-linear pt-2 mt-2">
    <div class="row row-cols-2 row-cols-md-4 g-0">
        {% for metric in info_graph.metrics %}
            <div class="col py-3">
                <div class="fs-36 fw-bold">{{ metric.value }}{{ metric.suffix or '' }}</div>
                <div class="opacity-75">{{ metric.label }}</div>
            </div>
        {% endfor %}
    </div>
</div>
