{% set intro = g.site_intro_text %}
{% set home_text = h.idb_theme_portal_text('home') %}

<div class="">
    {% if intro %}
        {{ h.render_markdown(intro) }}
    {% else %}
        {{ ui.heading(home_text.title, level=1, attrs={"class": "fs-36"}) }}
        <p class="opacity-75 fs-16">
            {{ home_text.paragraphs[0] }}
        </p>
    {% endif %}
</div>
